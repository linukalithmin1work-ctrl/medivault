// ─── HELPERS ──────────────────────────────────────────────────────────────────
function today() {
  return new Date().toISOString().split("T")[0];
}
function daysUntilExpiry(expiry) {
  return Math.ceil((new Date(expiry) - new Date()) / 86400000);
}
function fmtCurrency(n) {
  return "Rs. " + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function PharmacyApp() {
  const [user, setUser] = useState(null);
  const [state, setState] = useState(globalState);

  const update = (patch) => {
    const next = { ...state, ...patch };
    globalState = next;
    setState(next);
  };

  if (!user) return <LoginScreen onLogin={setUser} />;

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0f", fontFamily: "'DM Sans', sans-serif" }}>
      <style>{GLOBAL_CSS}</style>
      <TopBar user={user} onLogout={() => setUser(null)} />
      <div style={{ paddingTop: 64 }}>
        {user.role === "owner"   && <OwnerDashboard   state={state} update={update} user={user} />}
        {user.role === "stock"   && <StockDashboard   state={state} update={update} user={user} />}
        {user.role === "counter" && <CounterDashboard state={state} update={update} user={user} />}
        {user.role === "finance" && <FinanceDashboard state={state} update={update} user={user} />}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// LOGIN SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [selectedRole, setSelectedRole] = useState(null);
  const [pin, setPin] = useState("");
  const [error, setError] = useState("");
  const [shake, setShake] = useState(false);

  const roles = ["owner", "counter", "stock", "finance"];

  const handlePin = (digit) => {
    if (pin.length >= 4) return;
    const newPin = pin + digit;
    setPin(newPin);
    setError("");
    if (newPin.length === 4) {
      setTimeout(() => attemptLogin(newPin), 200);
    }
  };

  const attemptLogin = (p) => {
    const match = USERS.find(u => u.role === selectedRole && u.pin === p);
    if (match) {
      onLogin(match);
    } else {
      setShake(true);
      setError("Wrong PIN. Try again.");
      setPin("");
      setTimeout(() => setShake(false), 500);
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0f", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:32 }}>
      <style>{GLOBAL_CSS}</style>

      {/* Logo */}
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:48, marginBottom:8 }}>⚕️</div>
        <div style={{ color:"#fff", fontSize:28, fontWeight:800, letterSpacing:"-1px" }}>MediVault</div>
        <div style={{ color:"#555", fontSize:13, marginTop:4 }}>Pharmacy Management System</div>
      </div>

      {!selectedRole ? (
        /* Role Selection */
        <div style={{ display:"flex", gap:16, flexWrap:"wrap", justifyContent:"center", maxWidth:600, padding:"0 24px" }}>
          {roles.map(r => {
            const m = ROLE_META[r];
            return (
              <button key={r} onClick={() => setSelectedRole(r)} className="role-btn" style={{
                background: `linear-gradient(135deg, ${m.bg}, #111)`,
                border: `1px solid ${m.color}33`,
                borderRadius: 16,
                padding: "24px 32px",
                cursor: "pointer",
                color: "#fff",
                textAlign: "center",
                width: 140,
                transition: "all 0.2s",
              }}>
                <div style={{ fontSize:36, marginBottom:8 }}>{m.icon}</div>
                <div style={{ fontSize:15, fontWeight:700, color: m.color }}>{m.label}</div>
                <div style={{ fontSize:11, color:"#666", marginTop:4 }}>Login</div>
              </button>
            );
          })}
        </div>
      ) : (
        /* PIN Pad */
        <div style={{ textAlign:"center" }}>
          <div style={{ color: ROLE_META[selectedRole].color, fontSize:16, fontWeight:600, marginBottom:4 }}>
            {ROLE_META[selectedRole].icon} {ROLE_META[selectedRole].label} Access
          </div>
          <div style={{ color:"#555", fontSize:13, marginBottom:24 }}>Enter your 4-digit PIN</div>

          {/* PIN dots */}
          <div style={{ display:"flex", gap:16, justifyContent:"center", marginBottom:28, ...(shake ? {animation:"shake 0.4s"} : {}) }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{
                width:16, height:16, borderRadius:"50%",
                background: pin.length > i ? ROLE_META[selectedRole].color : "#222",
                border: `2px solid ${pin.length > i ? ROLE_META[selectedRole].color : "#333"}`,
                transition:"all 0.15s",
              }} />
            ))}
          </div>

          {error && <div style={{ color:"#ef4444", fontSize:13, marginBottom:16 }}>{error}</div>}

          {/* Numpad */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 72px)", gap:12, justifyContent:"center" }}>
            {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d, i) => (
              <button key={i} onClick={() => {
                if (d === "⌫") setPin(p => p.slice(0,-1));
                else if (d !== "") handlePin(String(d));
              }} style={{
                width:72, height:72, borderRadius:12,
                background: d === "" ? "transparent" : "#1a1a2e",
                border: d === "" ? "none" : "1px solid #2a2a4a",
                color:"#fff", fontSize:22, fontWeight:600, cursor: d === "" ? "default" : "pointer",
              }}>
                {d}
              </button>
            ))}
          </div>

          <button onClick={() => { setSelectedRole(null); setPin(""); setError(""); }}
            style={{ marginTop:20, background:"none", border:"none", color:"#555", fontSize:13, cursor:"pointer" }}>
            ← Back
          </button>

          <div style={{ marginTop:16, color:"#333", fontSize:11 }}>
            Demo PINs: Owner=1111 | Stock=2222 | Counter=3333 | Finance=4444
          </div>
        </div>
      )}
    </div>
  );
}

// OWNER DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function OwnerDashboard({ state, user }) {
  const [tab, setTab] = useState("overview");
  const totalSales = state.sales.reduce((s, b) => s + b.total, 0);
  const totalCost = state.medicines.reduce((s, m) => s + (m.costPrice * (INITIAL_MEDICINES.find(x=>x.id===m.id)?.stock - m.stock + (INITIAL_MEDICINES.find(x=>x.id===m.id)?.stock || 0) - m.stock || 0)), 0);
  const profit = totalSales * 0.38; // approx margin
  const lowStock = state.medicines.filter(m => m.stock < m.minStock);
  const expiringSoon = state.medicines.filter(m => daysUntilExpiry(m.expiry) <= 60);

  return (
    <DashLayout color="#f59e0b" tabs={[
      {id:"overview",label:"Overview",icon:"📊"},
      {id:"sales",label:"Sales",icon:"🧾"},
      {id:"staff",label:"Staff",icon:"👥"},
      {id:"inventory",label:"Inventory",icon:"📦"},
    ]} active={tab} onTab={setTab}>

      {tab === "overview" && (
        <div>
          <SectionTitle>Business Overview</SectionTitle>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:16, marginBottom:32 }}>
            <StatCard icon="💰" label="Total Revenue" value={fmtCurrency(totalSales)} color="#f59e0b" />
            <StatCard icon="📈" label="Est. Profit" value={fmtCurrency(profit)} color="#34d399" />
            <StatCard icon="📦" label="Total Medicines" value={state.medicines.length} color="#60a5fa" />
            <StatCard icon="⚠️" label="Low Stock Items" value={lowStock.length} color="#ef4444" />
            <StatCard icon="🕐" label="Expiring Soon" value={expiringSoon.length} color="#f97316" />
            <StatCard icon="👥" label="Total Staff" value={USERS.length - 1} color="#a78bfa" />
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
            <Card title="⚠️ Low Stock Alerts">
              {lowStock.length === 0 ? <EmptyMsg>All stocks are adequate</EmptyMsg> : lowStock.map(m => (
                <div key={m.id} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid #1a1a2e" }}>

            <Card title="🕐 Expiring Soon">

      {tab === "sales" && (
        <div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))", gap:16, marginBottom:24 }}>
            <StatCard icon="🧾" label="Total Bills" value={state.sales.length} color="#f59e0b" />

          <Card title="Recent Sales">

                    <td style={{ padding:"10px 0", color:"#f59e0b", fontWeight:600 }}>#{s.id}</td>
                    <td style={{ color:"#aaa", fontSize:13 }}>{s.date}</td>
                    <td style={{ color:"#aaa", fontSize:13 }}>{s.items.length} items</td>

                    <td style={{ textAlign:"right", color:"#34d399", fontWeight:600 }}>{fmtCurrency(s.total)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      )}

      {tab === "staff" && (

                    </div>
                  )}

        </div>
      )}

      {tab === "inventory" && (
        <div>
          <SectionTitle>Full Inventory</SectionTitle>
          <Card>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ color:"#555", fontSize:12 }}>
                  {["Medicine","Category","Stock","Min Stock","Sell Price","Cost Price","Expiry","Status"].map(h => (
                    <th key={h} style={{ padding:"8px 4px", textAlign:"left", whiteSpace:"nowrap" }}>{h}</th>

              </thead>
              <tbody>
                {state.medicines.map(m => {
                  const days = daysUntilExpiry(m.expiry);
                  const low = m.stock < m.minStock;
                  const expWarn = days <= 60;
                  return (
                    <tr key={m.id} style={{ borderTop:"1px solid #1a1a2e" }}>
                      <td style={{ padding:"9px 4px", color:"#ddd", fontWeight:500 }}>{m.name}</td>

                      <td style={{ color: low ? "#ef4444" : "#34d399", fontWeight:600 }}>{m.stock}</td>
                      <td style={{ color:"#666" }}>{m.minStock}</td>
                      <td style={{ color:"#ddd" }}>{fmtCurrency(m.price)}</td>
                      <td style={{ color:"#888" }}>{fmtCurrency(m.costPrice)}</td>
                      <td style={{ color: expWarn ? "#f97316" : "#888" }}>{m.expiry}</td>
                      <td>
                        {low && <Badge color="#ef4444">Low Stock</Badge>}
                        {expWarn && <Badge color="#f97316">{days}d</Badge>}
                        {!low && !expWarn && <Badge color="#34d399">OK</Badge>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      )}

// STOCK DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function StockDashboard({ state, update, user }) {
  const [tab, setTab] = useState("inventory");
  const [showAddForm, setShowAddForm] = useState(false);
  const [showRequestForm, setShowRequestForm] = useState(false);
  const [newMed, setNewMed] = useState({ name:"", category:"", stock:"", minStock:"", price:"", costPrice:"", expiry:"", supplier:"", unit:"tablets" });
  const [reqForm, setReqForm] = useState({ medicine:"", qty:"", cost:"", notes:"" });
  const [search, setSearch] = useState("");

  const lowStock = state.medicines.filter(m => m.stock < m.minStock);
  const expiringSoon = state.medicines.filter(m => daysUntilExpiry(m.expiry) <= 60);
  const filtered = state.medicines.filter(m => m.name.toLowerCase().includes(search.toLowerCase()));

  const addMedicine = () => {
    if (!newMed.name || !newMed.stock) return;
    const med = { ...newMed, id: state.medIdCounter, stock: +newMed.stock, minStock: +newMed.minStock, price: +newMed.price, costPrice: +newMed.costPrice };
    update({ medicines: [...state.medicines, med], medIdCounter: state.medIdCounter + 1 });
    setNewMed({ name:"", category:"", stock:"", minStock:"", price:"", costPrice:"", expiry:"", supplier:"", unit:"tablets" });
    setShowAddForm(false);
  };

  const submitRequest = () => {
    if (!reqForm.medicine || !reqForm.qty) return;
    const req = { id: Date.now(), medicine: reqForm.medicine, qty: +reqForm.qty, cost: +reqForm.cost, status:"pending", date: today(), requester: user.name };
    update({ stockRequests: [...state.stockRequests, req] });
    setReqForm({ medicine:"", qty:"", cost:"", notes:"" });
    setShowRequestForm(false);
  };

  const removeExpired = (id) => {
    update({ medicines: state.medicines.map(m => m.id === id ? { ...m, stock: 0 } : m) });
  };

  return (
    <DashLayout color="#60a5fa" tabs={[
      {id:"inventory",label:"Inventory",icon:"📦"},
      {id:"alerts",label:"Alerts",icon:"🔔"},
      {id:"requests",label:"Requests",icon:"📋"},
    ]} active={tab} onTab={setTab}>

      {tab === "inventory" && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
            <SectionTitle>Stock Inventory</SectionTitle>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setShowRequestForm(true)} className="btn-secondary">📋 Request Stock</button>
              <button onClick={() => setShowAddForm(true)} className="btn-primary" style={{ background:"#60a5fa" }}>+ Add Medicine</button>
            </div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))", gap:16, marginBottom:24 }}>
            <StatCard icon="📦" label="Total Items" value={state.medicines.length} color="#60a5fa" />
            <StatCard icon="⚠️" label="Low Stock" value={lowStock.length} color="#ef4444" />
            <StatCard icon="🕐" label="Expiring Soon" value={expiringSoon.length} color="#f97316" />
          </div>

          <Card>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Search medicines..." style={INPUT_STYLE} />
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, marginTop:12 }}>
              <thead>
                <tr style={{ color:"#555", fontSize:12 }}>
                  {["Medicine","Category","Stock","Min Stock","Unit Price","Expiry","Action"].map(h => (
                    <th key={h} style={{ padding:"8px 4px", textAlign:"left" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(m => {
                  const days = daysUntilExpiry(m.expiry);
                  const low = m.stock < m.minStock;
                  return (
                    <tr key={m.id} style={{ borderTop:"1px solid #1a1a2e", opacity: m.stock === 0 ? 0.4 : 1 }}>
                      <td style={{ padding:"10px 4px", color:"#ddd", fontWeight:500 }}>{m.name}</td>
                      <td style={{ color:"#888" }}>{m.category}</td>
                      <td style={{ color: low ? "#ef4444" : m.stock === 0 ? "#555" : "#34d399", fontWeight:700 }}>{m.stock}</td>
                      <td style={{ color:"#666" }}>{m.minStock}</td>
                      <td style={{ color:"#ddd" }}>{fmtCurrency(m.price)}</td>
                      <td style={{ color: days <= 30 ? "#ef4444" : days <= 60 ? "#f97316" : "#888" }}>{m.expiry} {days <= 60 && `(${days}d)`}</td>
                      <td>
                        {days <= 0 && m.stock > 0 && (
                          <button onClick={() => removeExpired(m.id)} style={{ background:"#7f1d1d", border:"1px solid #ef4444", color:"#ef4444", padding:"3px 10px", borderRadius:6, cursor:"pointer", fontSize:12 }}>
                            Remove Expired
                          </button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>

          {showAddForm && (
            <Modal title="Add New Medicine" onClose={() => setShowAddForm(false)}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                {[
                  ["Medicine Name","name","text"],["Category","category","text"],
                  ["Stock Quantity","stock","number"],["Min. Stock Level","minStock","number"],
                  ["Selling Price (Rs.)","price","number"],["Cost Price (Rs.)","costPrice","number"],
                  ["Expiry Date","expiry","date"],["Supplier","supplier","text"],
                ].map(([label, key, type]) => (
                  <div key={key}>
                    <label style={LABEL_STYLE}>{label}</label>
                    <input type={type} value={newMed[key]} onChange={e => setNewMed(p => ({...p,[key]:e.target.value}))} style={INPUT_STYLE} />
                  </div>
                ))}
                <div>
                  <label style={LABEL_STYLE}>Unit</label>
                  <select value={newMed.unit} onChange={e => setNewMed(p=>({...p,unit:e.target.value}))} style={INPUT_STYLE}>
                    {["tablets","capsules","ml","mg","inhaler","syrup","injection"].map(u => <option key={u}>{u}</option>)}
                  </select>
                </div>
              </div>
              <button onClick={addMedicine} className="btn-primary" style={{ marginTop:16, width:"100%", background:"#60a5fa" }}>Add Medicine</button>
            </Modal>
          )}

          {showRequestForm && (
            <Modal title="Request Stock Order" onClose={() => setShowRequestForm(false)}>
              <div style={{ display:"grid", gap:12 }}>
                {[["Medicine Name","medicine","text"],["Quantity","qty","number"],["Estimated Cost (Rs.)","cost","number"]].map(([label,key,type]) => (
                  <div key={key}>
                    <label style={LABEL_STYLE}>{label}</label>
                    <input type={type} value={reqForm[key]} onChange={e => setReqForm(p=>({...p,[key]:e.target.value}))} style={INPUT_STYLE} />
                  </div>
                ))}
              </div>
              <button onClick={submitRequest} className="btn-primary" style={{ marginTop:16, width:"100%", background:"#60a5fa" }}>Submit Request</button>
            </Modal>
          )}
        </div>
      )}

      {tab === "alerts" && (
        <div>
          <SectionTitle>Stock Alerts</SectionTitle>
          {lowStock.length > 0 && (
            <div style={{ marginBottom:24 }}>
              <Card title="⚠️ Low Stock Medicines">
                {lowStock.map(m => (
                  <div key={m.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 0", borderBottom:"1px solid #1a1a2e" }}>
                    <div>
                      <div style={{ color:"#ddd", fontWeight:600 }}>{m.name}</div>
                      <div style={{ color:"#555", fontSize:12 }}>Min required: {m.minStock} {m.unit}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ color:"#ef4444", fontWeight:700, fontSize:18 }}>{m.stock}</div>
                      <div style={{ color:"#555", fontSize:11 }}>{m.unit} remaining</div>
                    </div>
                  </div>
                ))}
              </Card>
            </div>
          )}
          {expiringSoon.length > 0 && (
            <Card title="🕐 Expiry Alerts">
              {expiringSoon.map(m => {
                const days = daysUntilExpiry(m.expiry);
                return (
                  <div key={m.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 0", borderBottom:"1px solid #1a1a2e" }}>
                    <div>
                      <div style={{ color:"#ddd", fontWeight:600 }}>{m.name}</div>
                      <div style={{ color:"#555", fontSize:12 }}>Expires: {m.expiry}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ color: days <= 30 ? "#ef4444" : "#f97316", fontWeight:700 }}>{days} days</div>
                      <div style={{ color:"#555", fontSize:11 }}>Stock: {m.stock}</div>
                    </div>
                  </div>
                );
              })}
            </Card>
          )}
          {lowStock.length === 0 && expiringSoon.length === 0 && <EmptyMsg>✅ No alerts at this time</EmptyMsg>}
        </div>
      )}

      {tab === "requests" && (
        <div>
          <SectionTitle>Stock Requests</SectionTitle>
          <div style={{ display:"grid", gap:16 }}>
            {state.stockRequests.filter(r => r.requester === user.name || true).map(r => (
              <div key={r.id} style={{ background:"#111", border:`1px solid ${r.status === "approved" ? "#34d39933" : r.status === "rejected" ? "#ef444433" : "#f59e0b33"}`, borderRadius:12, padding:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                  <div>
                    <span style={{ color:"#ddd", fontWeight:600 }}>{r.medicine}</span>
                    <span style={{ color:"#555", fontSize:12, marginLeft:8 }}>by {r.requester}</span>
                  </div>
                  <Badge color={r.status === "approved" ? "#34d399" : r.status === "rejected" ? "#ef4444" : "#f59e0b"}>
                    {r.status}
                  </Badge>
                </div>
                <div style={{ display:"flex", gap:24, fontSize:13, color:"#888" }}>
                  <span>Qty: <strong style={{ color:"#ddd" }}>{r.qty}</strong></span>
                  <span>Est. Cost: <strong style={{ color:"#ddd" }}>{fmtCurrency(r.cost)}</strong></span>
                  <span>Date: {r.date}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </DashLayout>
  );
}

// COUNTER DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function CounterDashboard({ state, update, user }) {
  const [tab, setTab] = useState("billing");
  const [search, setSearch] = useState("");
  const [cart, setCart] = useState([]);
  const [billPrinted, setBillPrinted] = useState(false);

  const results = search.length > 1
    ? state.medicines.filter(m => m.name.toLowerCase().includes(search.toLowerCase()) && m.stock > 0)
    : [];

  const addToCart = (med) => {
    setCart(c => {
      const ex = c.find(x => x.id === med.id);
      if (ex) return c.map(x => x.id === med.id ? { ...x, qty: x.qty + 1 } : x);
      return [...c, { ...med, qty: 1 }];
    });
    setSearch("");
  };

  const updateQty = (id, qty) => {
    if (qty <= 0) setCart(c => c.filter(x => x.id !== id));
    else setCart(c => c.map(x => x.id === id ? { ...x, qty } : x));
  };

  const total = cart.reduce((s, x) => s + x.price * x.qty, 0);

  const checkout = () => {
    if (cart.length === 0) return;
    const bill = {
      id: state.billIdCounter,
      date: today(),
      items: cart.map(x => ({ name: x.name, qty: x.qty, price: x.price })),
      total,
      cashier: user.name,
    };
    const updatedMeds = state.medicines.map(m => {
      const cartItem = cart.find(x => x.id === m.id);
      return cartItem ? { ...m, stock: m.stock - cartItem.qty } : m;
    });
    update({ sales: [...state.sales, bill], medicines: updatedMeds, billIdCounter: state.billIdCounter + 1 });
    setBillPrinted(true);
    setTimeout(() => { setCart([]); setBillPrinted(false); }, 3000);
  };

  const outOfStock = state.medicines.filter(m => m.stock === 0);
  const lowStock = state.medicines.filter(m => m.stock > 0 && m.stock < m.minStock);

  return (
    <DashLayout color="#f472b6" tabs={[
      {id:"billing",label:"Billing",icon:"🧾"},
      {id:"medicines",label:"Medicines",icon:"💊"},
      {id:"history",label:"History",icon:"📋"},
    ]} active={tab} onTab={setTab}>

      {tab === "billing" && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 360px", gap:20 }}>
          {/* Left - Search & add */}
          <div>
            <SectionTitle>New Bill</SectionTitle>

            {(outOfStock.length > 0 || lowStock.length > 0) && (
              <div style={{ background:"#1a0f00", border:"1px solid #f97316", borderRadius:10, padding:12, marginBottom:16, fontSize:13 }}>
                {outOfStock.length > 0 && <div style={{ color:"#ef4444" }}>❌ Out of Stock: {outOfStock.map(m=>m.name).join(", ")}</div>}
                {lowStock.length > 0 && <div style={{ color:"#f97316", marginTop:4 }}>⚠️ Low Stock: {lowStock.map(m=>`${m.name} (${m.stock})`).join(", ")}</div>}
              </div>
            )}

            <div style={{ position:"relative", marginBottom:16 }}>
              <input
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="🔍 Search medicine to add..."
                style={{ ...INPUT_STYLE, width:"100%", boxSizing:"border-box" }}
              />
              {results.length > 0 && (
                <div style={{ position:"absolute", top:"100%", left:0, right:0, background:"#1a1a2e", border:"1px solid #2a2a4a", borderRadius:10, zIndex:50, maxHeight:250, overflowY:"auto" }}>
                  {results.map(m => (
                    <div key={m.id} onClick={() => addToCart(m)} style={{ padding:"10px 14px", cursor:"pointer", borderBottom:"1px solid #111", display:"flex", justifyContent:"space-between" }}>
                      <div>
                        <div style={{ color:"#ddd", fontSize:14 }}>{m.name}</div>
                        <div style={{ color:"#555", fontSize:11 }}>{m.category} • Stock: {m.stock}</div>
                      </div>
                      <div style={{ color:"#f472b6", fontWeight:600, fontSize:14 }}>{fmtCurrency(m.price)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Cart items */}
            {cart.length > 0 ? (
              <Card>
                {cart.map(item => (
                  <div key={item.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0", borderBottom:"1px solid #1a1a2e" }}>
                    <div style={{ flex:1 }}>
                      <div style={{ color:"#ddd", fontSize:14, fontWeight:500 }}>{item.name}</div>
                      <div style={{ color:"#555", fontSize:12 }}>{fmtCurrency(item.price)} each</div>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <button onClick={() => updateQty(item.id, item.qty - 1)} style={QTY_BTN}>−</button>
                      <span style={{ color:"#fff", minWidth:24, textAlign:"center" }}>{item.qty}</span>
                      <button onClick={() => updateQty(item.id, item.qty + 1)} disabled={item.qty >= item.stock} style={QTY_BTN}>+</button>
                    </div>
                    <div style={{ color:"#f472b6", fontWeight:600, minWidth:80, textAlign:"right" }}>
                      {fmtCurrency(item.price * item.qty)}
                    </div>
                  </div>
                ))}
              </Card>
            ) : (
              <div style={{ textAlign:"center", padding:60, color:"#333" }}>
                <div style={{ fontSize:48, marginBottom:8 }}>🛒</div>
                <div>Search and add medicines to the bill</div>
              </div>
            )}
          </div>

          {/* Right - Bill summary */}
          <div>
            <Card title="Bill Summary">
              <div style={{ marginBottom:16 }}>
                {cart.map(item => (
                  <div key={item.id} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", fontSize:13 }}>
                    <span style={{ color:"#888" }}>{item.name} × {item.qty}</span>
                    <span style={{ color:"#ddd" }}>{fmtCurrency(item.price * item.qty)}</span>
                  </div>
                ))}
              </div>
              <div style={{ borderTop:"1px solid #2a2a4a", paddingTop:12, display:"flex", justifyContent:"space-between", marginBottom:20 }}>
                <span style={{ color:"#aaa", fontWeight:600 }}>TOTAL</span>
                <span style={{ color:"#f472b6", fontWeight:800, fontSize:20 }}>{fmtCurrency(total)}</span>
              </div>
              {billPrinted ? (
                <div style={{ textAlign:"center", padding:16, background:"#052e16", border:"1px solid #34d399", borderRadius:10, color:"#34d399" }}>
                  ✅ Bill #{state.billIdCounter - 1} Complete!
                </div>
              ) : (
                <button onClick={checkout} disabled={cart.length === 0} className="btn-primary" style={{ width:"100%", background:"#f472b6", opacity: cart.length === 0 ? 0.4 : 1 }}>
                  🖨 Print Bill & Checkout
                </button>
              )}
              {cart.length > 0 && (
                <button onClick={() => setCart([])} style={{ width:"100%", marginTop:8, background:"none", border:"1px solid #333", color:"#666", padding:10, borderRadius:8, cursor:"pointer" }}>
                  Clear Cart
                </button>
              )}
            </Card>

            <Card title="Today's Summary" style={{ marginTop:16 }}>
              {(() => {
                const todaySales = state.sales.filter(s => s.date === today());
                return (
                  <>
                    <div style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", fontSize:13 }}>
                      <span style={{ color:"#888" }}>Bills Today</span>
                      <span style={{ color:"#ddd", fontWeight:600 }}>{todaySales.length}</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", fontSize:13 }}>
                      <span style={{ color:"#888" }}>Revenue Today</span>
                      <span style={{ color:"#f472b6", fontWeight:600 }}>{fmtCurrency(todaySales.reduce((s,b) => s + b.total, 0))}</span>
                    </div>
                  </>
                );
              })()}
            </Card>
          </div>
        </div>
      )}

      {tab === "medicines" && (
        <div>
          <SectionTitle>Available Medicines</SectionTitle>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:16 }}>
            {state.medicines.map(m => (
              <div key={m.id} style={{ background:"#111", border:"1px solid #1a1a2e", borderRadius:12, padding:16, opacity: m.stock === 0 ? 0.5 : 1 }}>
                <div style={{ color:"#ddd", fontWeight:600, marginBottom:4 }}>{m.name}</div>
                <div style={{ color:"#666", fontSize:12, marginBottom:8 }}>{m.category}</div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div>
                    <div style={{ color:"#f472b6", fontWeight:700 }}>{fmtCurrency(m.price)}</div>
                    <div style={{ color: m.stock === 0 ? "#ef4444" : m.stock < m.minStock ? "#f97316" : "#34d399", fontSize:12 }}>
                      {m.stock === 0 ? "OUT OF STOCK" : `${m.stock} in stock`}
                    </div>
                  </div>
                  {m.stock > 0 && (
                    <button onClick={() => { addToCart(m); setTab("billing"); }} style={{ background:"#f472b622", border:"1px solid #f472b6", color:"#f472b6", padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:12 }}>
                      + Add
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === "history" && (
        <div>
          <SectionTitle>My Sales History</SectionTitle>
          <Card>
            {state.sales.filter(s => s.cashier === user.name).length === 0 ? (
              <EmptyMsg>No sales recorded yet</EmptyMsg>
            ) : (
              [...state.sales].filter(s => s.cashier === user.name).reverse().map(s => (
                <div key={s.id} style={{ padding:"12px 0", borderBottom:"1px solid #1a1a2e" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                    <span style={{ color:"#f472b6", fontWeight:600 }}>Bill #{s.id}</span>
                    <span style={{ color:"#34d399", fontWeight:600 }}>{fmtCurrency(s.total)}</span>
                  </div>
                  <div style={{ color:"#666", fontSize:12 }}>{s.date} • {s.items.map(i => `${i.name} ×${i.qty}`).join(", ")}</div>
                </div>
              ))
            )}
          </Card>
        </div>
      )}
    </DashLayout>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// FINANCE DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function FinanceDashboard({ state, update, user }) {
  const [tab, setTab] = useState("overview");
  const [salaryEdit, setSalaryEdit] = useState(null);
  const [editVal, setEditVal] = useState("");

  const totalRevenue = state.sales.reduce((s, b) => s + b.total, 0);
  const totalCostPrice = state.medicines.reduce((s, m) => s + m.costPrice * (INITIAL_MEDICINES.find(x=>x.id===m.id)?.stock - m.stock || 0), 0);
  const totalSalaries = state.employees.reduce((s, e) => s + e.salary, 0);
  const netProfit = totalRevenue - Math.abs(totalCostPrice) - totalSalaries;

  const approveRequest = (id) => {
    update({ stockRequests: state.stockRequests.map(r => r.id === id ? { ...r, status:"approved" } : r) });
  };
  const rejectRequest = (id) => {
    update({ stockRequests: state.stockRequests.map(r => r.id === id ? { ...r, status:"rejected" } : r) });
  };

  const saveSalary = (empId) => {
    update({ employees: state.employees.map(e => e.id === empId ? { ...e, salary: +editVal } : e) });
    setSalaryEdit(null);
  };

  const togglePaid = (empId) => {
    update({ employees: state.employees.map(e => e.id === empId ? { ...e, paid: !e.paid } : e) });
  };

  return (
    <DashLayout color="#34d399" tabs={[
      {id:"overview",label:"Overview",icon:"📊"},
      {id:"profit",label:"P&L",icon:"💹"},
      {id:"salaries",label:"Salaries",icon:"💳"},
      {id:"approvals",label:"Approvals",icon:"✅"},
    ]} active={tab} onTab={setTab}>

      {tab === "overview" && (
        <div>
          <SectionTitle>Financial Overview</SectionTitle>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:16, marginBottom:32 }}>
            <StatCard icon="💵" label="Total Revenue" value={fmtCurrency(totalRevenue)} color="#34d399" />
            <StatCard icon="📦" label="Stock Costs" value={fmtCurrency(Math.abs(totalCostPrice))} color="#60a5fa" />
            <StatCard icon="👥" label="Total Salaries" value={fmtCurrency(totalSalaries)} color="#f472b6" />
            <StatCard icon="📈" label="Net Profit" value={fmtCurrency(netProfit)} color={netProfit > 0 ? "#34d399" : "#ef4444"} />
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
            <Card title="Revenue by Day">
              {state.sales.map(s => (
                <div key={s.id} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:"1px solid #1a1a2e", fontSize:13 }}>
                  <span style={{ color:"#888" }}>{s.date} — Bill #{s.id}</span>
                  <span style={{ color:"#34d399", fontWeight:600 }}>{fmtCurrency(s.total)}</span>
                </div>
              ))}
            </Card>
            <Card title="Pending Approvals">
              {state.stockRequests.filter(r => r.status === "pending").length === 0
                ? <EmptyMsg>No pending approvals</EmptyMsg>
                : state.stockRequests.filter(r => r.status === "pending").map(r => (
                  <div key={r.id} style={{ padding:"10px 0", borderBottom:"1px solid #1a1a2e" }}>
                    <div style={{ color:"#ddd", fontSize:14, fontWeight:500 }}>{r.medicine}</div>
                    <div style={{ color:"#666", fontSize:12 }}>Qty: {r.qty} • Cost: {fmtCurrency(r.cost)}</div>
                    <div style={{ display:"flex", gap:8, marginTop:8 }}>
                      <button onClick={() => approveRequest(r.id)} style={{ background:"#052e16", border:"1px solid #34d399", color:"#34d399", padding:"4px 12px", borderRadius:6, cursor:"pointer", fontSize:12 }}>✓ Approve</button>
                      <button onClick={() => rejectRequest(r.id)} style={{ background:"#1a0000", border:"1px solid #ef4444", color:"#ef4444", padding:"4px 12px", borderRadius:6, cursor:"pointer", fontSize:12 }}>✗ Reject</button>
                    </div>
                  </div>
                ))
              }
            </Card>
          </div>
        </div>
      )}

      {tab === "profit" && (
        <div>
          <SectionTitle>Profit & Loss Report</SectionTitle>
          <Card>
            <div style={{ marginBottom:24 }}>
              <div style={{ color:"#555", fontSize:12, marginBottom:16, textTransform:"uppercase", letterSpacing:1 }}>Income</div>
              <Row label="Total Sales Revenue" value={fmtCurrency(totalRevenue)} color="#34d399" />
            </div>
            <div style={{ marginBottom:24 }}>
              <div style={{ color:"#555", fontSize:12, marginBottom:16, textTransform:"uppercase", letterSpacing:1 }}>Expenses</div>
              <Row label="Medicine Procurement" value={`− ${fmtCurrency(Math.abs(totalCostPrice))}`} color="#ef4444" />
              <Row label="Staff Salaries" value={`− ${fmtCurrency(totalSalaries)}`} color="#ef4444" />
              <Row label="Other Expenses" value="− Rs. 0.00" color="#666" />
            </div>
            <div style={{ borderTop:"2px solid #2a2a4a", paddingTop:16 }}>
              <Row label="NET PROFIT" value={fmtCurrency(netProfit)} color={netProfit > 0 ? "#34d399" : "#ef4444"} large />
              <Row label="Profit Margin" value={`${((netProfit / totalRevenue) * 100).toFixed(1)}%`} color="#60a5fa" />
            </div>
          </Card>
        </div>
      )}

      {tab === "salaries" && (
        <div>
          <SectionTitle>Salary Management</SectionTitle>
          <div style={{ display:"grid", gap:16 }}>
            {state.employees.map(emp => {
              const m = ROLE_META[emp.role];
              return (
                <div key={emp.id} style={{ background:"#111", border:"1px solid #1a1a2e", borderRadius:12, padding:20, display:"flex", alignItems:"center", gap:20 }}>
                  <div style={{ width:44, height:44, borderRadius:"50%", background:`linear-gradient(135deg, ${m.color}, ${m.bg})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:"#fff" }}>
                    {emp.name.split(" ").map(n=>n[0]).join("")}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ color:"#ddd", fontWeight:600 }}>{emp.name}</div>
                    <div style={{ color:m.color, fontSize:12 }}>{m.icon} {m.label}</div>
                  </div>
                  <div style={{ flex:1 }}>
                    {salaryEdit === emp.id ? (
                      <div style={{ display:"flex", gap:8 }}>
                        <input type="number" value={editVal} onChange={e => setEditVal(e.target.value)} style={{ ...INPUT_STYLE, width:120 }} />
                        <button onClick={() => saveSalary(emp.id)} style={{ background:"#052e16", border:"1px solid #34d399", color:"#34d399", padding:"6px 12px", borderRadius:6, cursor:"pointer" }}>Save</button>
                      </div>
                    ) : (
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <span style={{ color:"#fff", fontWeight:700, fontSize:16 }}>{fmtCurrency(emp.salary)}</span>
                        <button onClick={() => { setSalaryEdit(emp.id); setEditVal(emp.salary); }} style={{ background:"none", border:"1px solid #333", color:"#666", padding:"3px 8px", borderRadius:6, cursor:"pointer", fontSize:12 }}>Edit</button>
                      </div>
                    )}
                  </div>
                  <button onClick={() => togglePaid(emp.id)} style={{
                    background: emp.paid ? "#052e16" : "#1a0f00",
                    border: `1px solid ${emp.paid ? "#34d399" : "#f97316"}`,
                    color: emp.paid ? "#34d399" : "#f97316",
                    padding:"8px 16px", borderRadius:8, cursor:"pointer", fontWeight:600, fontSize:13,
                  }}>
                    {emp.paid ? "✓ Paid" : "Mark Paid"}
                  </button>
                </div>
              );
            })}
            <div style={{ background:"#111", border:"1px solid #2a2a4a", borderRadius:12, padding:16, display:"flex", justifyContent:"space-between" }}>
              <span style={{ color:"#888" }}>Total Salary Payout</span>
              <span style={{ color:"#34d399", fontWeight:700, fontSize:18 }}>{fmtCurrency(totalSalaries)}</span>
            </div>
          </div>
        </div>
      )}

      {tab === "approvals" && (
        <div>
          <SectionTitle>Stock Purchase Approvals</SectionTitle>
          <div style={{ display:"grid", gap:16 }}>
            {state.stockRequests.map(r => (
              <div key={r.id} style={{ background:"#111", border:`1px solid ${r.status==="approved"?"#34d39933":r.status==="rejected"?"#ef444433":"#f59e0b33"}`, borderRadius:12, padding:20 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
                  <div>
                    <div style={{ color:"#ddd", fontWeight:600, fontSize:16 }}>{r.medicine}</div>
                    <div style={{ color:"#666", fontSize:12, marginTop:2 }}>Requested by {r.requester} on {r.date}</div>
                  </div>
                  <Badge color={r.status==="approved"?"#34d399":r.status==="rejected"?"#ef4444":"#f59e0b"}>
                    {r.status.toUpperCase()}
                  </Badge>
                </div>
                <div style={{ display:"flex", gap:24, fontSize:14, marginBottom:12 }}>
                  <div><span style={{ color:"#555" }}>Quantity: </span><strong style={{ color:"#ddd" }}>{r.qty} units</strong></div>
                  <div><span style={{ color:"#555" }}>Estimated Cost: </span><strong style={{ color:"#34d399" }}>{fmtCurrency(r.cost)}</strong></div>
                </div>
                {r.status === "pending" && (
                  <div style={{ display:"flex", gap:10 }}>
                    <button onClick={() => approveRequest(r.id)} className="btn-primary" style={{ background:"#34d399", color:"#000" }}>✓ Approve Purchase</button>
                    <button onClick={() => rejectRequest(r.id)} style={{ background:"#1a0000", border:"1px solid #ef4444", color:"#ef4444", padding:"8px 20px", borderRadius:8, cursor:"pointer", fontWeight:600 }}>✗ Reject</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </DashLayout>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SHARED COMPONENTS
// ═══════════════════════════════════════════════════════════════════════════════
function DashLayout({ color, tabs, active, onTab, children }) {
  return (
    <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", minHeight:"calc(100vh - 64px)" }}>
      {/* Sidebar */}
      <div style={{ background:"#0d0d1a", borderRight:"1px solid #1a1a2e", padding:"24px 0" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => onTab(t.id)} style={{
            display:"flex", alignItems:"center", gap:10,
            width:"100%", padding:"12px 20px", background:"none", border:"none", cursor:"pointer",
            color: active === t.id ? "#fff" : "#555",
            borderLeft: active === t.id ? `3px solid ${color}` : "3px solid transparent",
            fontSize:14, fontWeight: active === t.id ? 600 : 400,
            transition:"all 0.15s",
          }}>
            <span>{t.icon}</span> {t.label}
          </button>
        ))}
      </div>
      {/* Content */}
      <div style={{ padding:28, overflowY:"auto" }}>
        {children}
      </div>
    </div>
  );
}

function StatCard({ icon, label, value, color }) {
  return (
    <div style={{ background:"#111", border:"1px solid #1a1a2e", borderRadius:12, padding:"18px 20px" }}>
      <div style={{ fontSize:24, marginBottom:8 }}>{icon}</div>
      <div style={{ color:"#555", fontSize:12, marginBottom:4 }}>{label}</div>
      <div style={{ color, fontWeight:800, fontSize:22 }}>{value}</div>
    </div>
  );
}

function Card({ title, children, style }) {
  return (
    <div style={{ background:"#111", border:"1px solid #1a1a2e", borderRadius:12, padding:20, ...style }}>
      {title && <div style={{ color:"#888", fontSize:13, fontWeight:600, marginBottom:14, textTransform:"uppercase", letterSpacing:"0.5px" }}>{title}</div>}
      {children}
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"#000000cc", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"#111", border:"1px solid #2a2a4a", borderRadius:16, padding:28, width:"min(560px, 90vw)", maxHeight:"80vh", overflowY:"auto" }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:20 }}>
          <div style={{ color:"#fff", fontWeight:700, fontSize:18 }}>{title}</div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#555", fontSize:20, cursor:"pointer" }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function SectionTitle({ children }) {
  return <h2 style={{ color:"#fff", fontSize:20, fontWeight:700, marginBottom:20, marginTop:0 }}>{children}</h2>;
}

function EmptyMsg({ children }) {
  return <div style={{ color:"#444", textAlign:"center", padding:24, fontSize:14 }}>{children}</div>;
}

function Badge({ color, children }) {
  return (
    <span style={{ background:`${color}22`, color, border:`1px solid ${color}55`, borderRadius:20, padding:"2px 10px", fontSize:12, fontWeight:600 }}>
      {children}
    </span>
  );
}

function Row({ label, value, color, large }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", padding:"10px 0", borderBottom:"1px solid #1a1a2e" }}>
      <span style={{ color:"#888", fontSize: large ? 15 : 14, fontWeight: large ? 700 : 400 }}>{label}</span>
      <span style={{ color: color || "#ddd", fontWeight:700, fontSize: large ? 20 : 14 }}>{value}</span>
    </div>
  );
}

  background:"#1a1a2e", border:"1px solid #2a2a4a", borderRadius:8,

};
const LABEL_STYLE = { color:"#666", fontSize:12, display:"block", marginBottom:6 };
const QTY_BTN = {
  background:"#1a1a2e", border:"1px solid #2a2a4a", color:"#fff",
  width:28, height:28, borderRadius:6, cursor:"pointer", fontSize:16,
